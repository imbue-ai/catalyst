name: Python Backend Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'
          enable-cache: true

      - name: Run Context Manager Tests
        run: uv run python -m unittest test_context_manager.py
        working-directory: src

      - name: Run Orchestrator Tests
        run: uv run python -m unittest discover -t . -s orchestrator
        working-directory: src

      - name: Run Server Tests
        run: uv run python -m unittest test_server.py
        working-directory: src
