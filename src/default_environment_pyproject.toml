[project]
name = "ai-scientist-environment"
version = "0.1.0"
description = "Catalyst environment"
requires-python = ">=3.11"
dependencies = [
    "darwinian-evolver",
    "torch>=2.0",
    "matplotlib>=3.7",
    "numpy>=1.24",
    "pyyaml>=6.0",
    "pydantic>=2.0",
    "scipy>=1.17.1",
]

[tool.uv]
exclude-newer = "2 week"

[tool.uv.sources]
darwinian-evolver = { path = "darwinian_evolver", editable = true }