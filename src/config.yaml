phenomenon_description: |
  Bifurcation in shallow (two-layer) ReLU MLPs: when a shallow MLP is trained to
  approximate a target function, its learned features can undergo sudden qualitative
  transitions as continuous parameters (network width, learning rate, target function
  shape) are varied. Individual ReLU neurons' contributions abruptly reorganize from
  one representational strategy to another at certain parameter thresholds.

organisms_dir: organisms
logs_dir: logs
max_population: 20
generations: 5
experiments_per_organism_per_generation: 2
selection_strategy: tournament
tournament_size: 3
mutation_rate: 0.8
elite_count: 2
cli_tool_path: python -m shallow_mlps.cli

agent_configs:
  experimenter:
    model: claude-sonnet-4-20250514
    temperature: 0.7
    max_tokens: 4096
    timeout_seconds: 300
  interpreter:
    model: claude-sonnet-4-20250514
    temperature: 0.3
    max_tokens: 4096
    timeout_seconds: 300
  scorer:
    model: claude-sonnet-4-20250514
    temperature: 0.3
    max_tokens: 2048
    timeout_seconds: 300
  mutator:
    model: claude-sonnet-4-20250514
    temperature: 0.9
    max_tokens: 8192
    timeout_seconds: 300
  verifier:
    model: claude-sonnet-4-20250514
    temperature: 0.2
    max_tokens: 2048
    timeout_seconds: 300
