[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-scientist"
version = "0.1.0"
description = "AI-driven scientific research agent"
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
    "pydantic>=2.0",
    "darwinian-evolver",
    "fastapi>=0.135.3",
    "uvicorn>=0.44.0",
    "python-multipart>=0.0.26",
]

[tool.setuptools]
packages = ["orchestrator"]

[project.scripts]
shallow-mlps = "shallow_mlps.cli:main"

[tool.uv]
exclude-newer = "2 week"

[tool.uv.sources]
darwinian-evolver = { path = "../darwinian_evolver", editable = true }

[dependency-groups]
dev = [
    "verify-everything>=0.2.7",
]
