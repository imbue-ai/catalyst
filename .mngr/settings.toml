# Project-level mngr settings, picked up by `mngr create` for every
# Catalyst step. Auto-discovered via the git root.

[agent_types.claude]
# Auto-trust the work_dir and dismiss Claude Code's onboarding dialogs so
# headless `mngr create --no-connect` starts cleanly.
auto_dismiss_dialogs = true
# Catalyst steps run unattended -- can't stop to ask for tool permission.
# The plugin installs a `PermissionRequest` hook that auto-replies "allow"
# to every per-tool prompt. Orthogonal to sandboxing: the sandbox-exec
# filesystem/network policy and `allowUnsandboxedCommands: false` in
# `src/claude_skills/settings.json` stay enforced.
auto_allow_permissions = true

[agent_types.antigravity]
# agy's first-launch trust dialog would otherwise intercept the initial
# message keystrokes; this silently appends the work_dir to agy's
# trustedWorkspaces during provisioning.
auto_dismiss_dialogs = true
# Catalyst steps run unattended, but we want agy *sandboxed* (the runner
# passes `--sandbox`). We deliberately do NOT use `auto_allow_permissions`
# here: that adds `--dangerously-skip-permissions`, which silently disables
# the sandbox (agy bug #36) and makes the permissions policy moot. Instead
# we auto-approve via agy's native permissions policy, which keeps the
# sandbox enforced:
#   - `toolPermission = "proceed-in-sandbox"` auto-proceeds every tool call
#     as long as it runs *inside* the sandbox -- no per-tool dialog.
#   - `deny = ["unsandboxed"]` refuses any attempt to run *outside* the
#     sandbox (the one thing we never auto-allow), so the agent can't
#     escalate out of isolation. Deny outranks everything (Deny > Ask > Allow).
auto_allow_permissions = false
settings_overrides = { toolPermission = "proceed-in-sandbox", permissions = { deny = ["unsandboxed"] } }
